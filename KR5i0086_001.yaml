body:
  text: 文昌延嗣經文昌延嗣經序孟子云不孝有三無後為大善哉是言也知斯言之為要則知延嗣經之不可少矣蓋天之生機本自不息而人乃有嗣有不嗣者以其人之善惡有殊而天之生機因而異耳然厯觀乏嗣之人半屬癡迷不悟溺於聲色貨利之場而於立心行已之要置若罔聞於是玉皇大天尊哀憫凡愚爰命帝君著斯經以垂世俾人於捧持之際猛然深省改其向日之非以歸於是將一心悔悟即格天心心既可以對諸天地而天地之生機即在我矣又何慮嗣之不延乎倘僅以拜誦了事而於經中妙義徒口誦而弗心維則我帝君雖甚慈仁究亦無如之何也惟願覩斯經者咸以吾言為藥石共樂休徵則幸甚矣時雍正甲寅孟冬朔文昌右弼天聾真人降撰
